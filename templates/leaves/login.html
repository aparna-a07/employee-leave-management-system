<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – LeaveTrack</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',sans-serif; background: linear-gradient(135deg, #1e3a5f 0%, #27507a 60%, #3498db 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-box { background:#fff; border-radius:16px; padding:40px 36px; width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,.25); }
  .brand { text-align:center; margin-bottom:28px; }
  .brand-icon { font-size:2.5rem; }
  .brand h1 { font-size:1.5rem; font-weight:700; color:#1e3a5f; margin-top:8px; }
  .brand p { font-size:.85rem; color:#888; margin-top:4px; }
  label { display:block; font-size:.83rem; font-weight:600; color:#444; margin-bottom:6px; }
  input { width:100%; padding:11px 14px; border:1.5px solid #ddd; border-radius:8px; font-size:.92rem; transition:border-color .2s; }
  input:focus { outline:none; border-color:#1e3a5f; }
  .form-group { margin-bottom:18px; }
  .btn-login { width:100%; padding:12px; background:#1e3a5f; color:#fff; border:none; border-radius:8px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .2s; margin-top:8px; }
  .btn-login:hover { background:#27507a; }
  .alert { background:#f8d7da; color:#58151c; border-radius:8px; padding:10px 14px; margin-bottom:16px; font-size:.85rem; border-left:4px solid #e74c3c; }
  .demo-accounts { margin-top:22px; padding:14px; background:#f8f9fa; border-radius:8px; }
  .demo-accounts h4 { font-size:.8rem; color:#666; margin-bottom:10px; text-transform:uppercase; letter-spacing:.5px; }
  .demo-row { display:flex; justify-content:space-between; font-size:.8rem; color:#555; margin-bottom:6px; }
  .demo-row span { font-family:monospace; background:#e9ecef; padding:2px 6px; border-radius:4px; }
</style>
</head>
<body>
<div class="login-box">
  <div class="brand">
    <div class="brand-icon">📋</div>
    <h1>Leave Management</h1>
    <p>Sign in to continue</p>
  </div>
  {% for m in messages %}<div class="alert">{{ m }}</div>{% endfor %}
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username" required autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password" required>
    </div>
    <button type="submit" class="btn-login">Sign In</button>
  </form>
  <div class="demo-accounts">
    <h4>Demo Accounts</h4>
    <div class="demo-row">Manager: <span>admin / admin123</span></div>
    <div class="demo-row">Employee: <span>alice / alice123</span></div>
    <div class="demo-row">Employee: <span>bob / bob123</span></div>
  </div>
</div>
</body>
</html>
